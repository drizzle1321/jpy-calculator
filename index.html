<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>日幣匯率計算器</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="日幣計算器">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #e5e7eb;
      --success: #059669;
      --danger: #dc2626;
      --shadow: rgba(0, 0, 0, 0.08);
      --result-bg: linear-gradient(135deg, #2563eb, #1d4ed8);
      --result-text: #ffffff;
      --input-bg: #ffffff;
    }

    html[data-theme="dark"] {
      --bg: #030712;
      --card: #111827;
      --card-soft: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --border: #374151;
      --success: #34d399;
      --danger: #f87171;
      --shadow: rgba(0, 0, 0, 0.35);
      --result-bg: linear-gradient(135deg, #1d4ed8, #0f172a);
      --result-text: #ffffff;
      --input-bg: #0f172a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
      padding-top: max(18px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      transition: background 0.2s ease, color 0.2s ease;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 14px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.2;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 6px;
    }

    .theme-toggle {
      width: auto;
      min-width: 54px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      padding: 0 13px;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
    }

    .result-card {
      background: var(--result-bg);
      color: var(--result-text);
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 14px 35px var(--shadow);
      margin-bottom: 16px;
      position: sticky;
      top: 12px;
      z-index: 5;
    }

    .result-label {
      font-size: 14px;
      opacity: 0.88;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .result-value {
      font-size: 42px;
      line-height: 1.12;
      font-weight: 950;
      letter-spacing: -0.8px;
      word-break: break-all;
    }

    .result-sub {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.82;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 28px var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input,
    select {
      width: 100%;
      font-size: 22px;
      padding: 15px 15px;
      border-radius: 16px;
      border: 1px solid var(--border);
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      margin-bottom: 16px;
      appearance: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 17px;
      font-weight: 900;
      color: white;
      background: var(--primary);
      cursor: pointer;
      margin-top: 4px;
    }

    button:active {
      background: var(--primary-dark);
      transform: scale(0.99);
    }

    .secondary {
      background: #111827;
      color: #ffffff;
    }

    html[data-theme="dark"] .secondary {
      background: #374151;
    }

    .quick-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-buttons button {
      margin: 0;
      padding: 12px 8px;
      font-size: 15px;
      border-radius: 13px;
      background: var(--card-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .quick-buttons button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .formula {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .rate-card {
      background: var(--card);
      border-radius: 22px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px var(--shadow);
    }

    .rate-line {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .rate-line strong {
      color: var(--text);
      font-size: 15px;
    }

    .status {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status.ok {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    details {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      user-select: none;
    }

    .manual-rate {
      margin-top: 12px;
    }

    .manual-rate input {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
    }

    @media (max-width: 380px) {
      body {
        padding-left: 14px;
        padding-right: 14px;
      }

      .title {
        font-size: 24px;
      }

      .result-value {
        font-size: 36px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-bar">
      <div class="title-wrap">
        <h1 class="title">日幣計算器</h1>
        <div class="subtitle">輸入日幣金額，自動換算台幣並加上指定金額。</div>
		<div class="subtitle">Design by KuoChe v3.1</div>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換深色模式">🌙</button>
    </div>

    <div class="result-card">
      <div class="result-label">計算結果，約台幣</div>
      <div id="result" class="result-value">NT$ 0</div>
      <div id="resultSub" class="result-sub">輸入日幣金額後會自動計算</div>
    </div>

    <div class="card">
      <label for="price">輸入日幣價格</label>
      <input id="price" type="number" inputmode="decimal" placeholder="例如 10000" />

      <div class="row">
        <div>
          <label for="multiplier">固定倍率</label>
          <input id="multiplier" type="number" inputmode="decimal" step="0.01" value="1.05" />
        </div>

        <div>
          <label for="extra">快速加上金額</label>
          <select id="extra">
            <option value="0">0</option>
            <option value="50">50</option>
            <option value="80">80</option>
            <option value="100">100</option>
            <option value="120">120</option>
            <option value="150">150</option>
          </select>
        </div>
      </div>

      <label for="customExtra">自訂加上金額</label>
      <input id="customExtra" type="number" inputmode="decimal" placeholder="沒有需要可留空，例如 200" />

      <div class="quick-buttons">
        <button type="button" data-extra="50">+50</button>
        <button type="button" data-extra="80">+80</button>
        <button type="button" data-extra="100">+100</button>
        <button type="button" data-extra="120">+120</button>
        <button type="button" data-extra="150">+150</button>
        <button type="button" data-extra="200">+0</button>
      </div>

      <button type="button" onclick="copyResult()">複製結果</button>

      <div id="formula" class="formula">
        公式：日幣價格 × 匯率 × 1.05 + 加上金額
      </div>
    </div>

    <div class="rate-card">
      <div class="rate-line">
        <strong id="rateText">目前匯率：正在抓取...</strong>
      </div>
      <div id="status" class="status">會自動抓取 JPY → TWD 匯率。</div>

      <details>
        <summary>手動修改匯率</summary>
        <div class="manual-rate">
          <label for="rate">JPY → TWD 匯率</label>
          <input id="rate" type="number" inputmode="decimal" step="0.0001" placeholder="例如 0.215" />
          <button type="button" onclick="fetchRate()">重新抓匯率</button>
        </div>
      </details>

      <div class="small">
        自訂加上金額有輸入時，會優先使用自訂金額。匯率來源：Rates By Exchange Rate API。
      </div>
    </div>
  </div>

  <script>
    const rateInput = document.getElementById("rate");
    const priceInput = document.getElementById("price");
    const multiplierInput = document.getElementById("multiplier");
    const extraSelect = document.getElementById("extra");
    const customExtraInput = document.getElementById("customExtra");
    const resultEl = document.getElementById("result");
    const resultSubEl = document.getElementById("resultSub");
    const statusEl = document.getElementById("status");
    const rateTextEl = document.getElementById("rateText");
    const formulaEl = document.getElementById("formula");
    const quickButtons = document.querySelectorAll(".quick-buttons button");
    const themeToggle = document.getElementById("themeToggle");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";

      const themeColor = document.querySelector('meta[name="theme-color"]');
      if (themeColor) {
        themeColor.setAttribute("content", theme === "dark" ? "#030712" : "#2563eb");
      }
    }

    function initTheme() {
      const savedTheme = localStorage.getItem("jpy_theme");

      if (savedTheme === "dark" || savedTheme === "light") {
        applyTheme(savedTheme);
        return;
      }

      const prefersDark = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      applyTheme(prefersDark ? "dark" : "light");
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      const next = current === "dark" ? "light" : "dark";

      localStorage.setItem("jpy_theme", next);
      applyTheme(next);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-TW", {
        maximumFractionDigits: 0
      }).format(value);
    }

    function formatRate(value) {
      if (!value || isNaN(value)) return "尚未取得";
      return Number(value).toFixed(5);
    }

    function getExtraAmount() {
      if (customExtraInput.value.trim() !== "") {
        return parseFloat(customExtraInput.value) || 0;
      }

      return parseFloat(extraSelect.value) || 0;
    }

    function updateRateText() {
      const rate = parseFloat(rateInput.value) || 0;

      if (rate > 0) {
        rateTextEl.textContent = `目前匯率：1 日圓 ≈ ${formatRate(rate)} 台幣`;
      } else {
        rateTextEl.textContent = "目前匯率：尚未取得";
      }
    }

    function calculate() {
      const rate = parseFloat(rateInput.value) || 0;
      const price = parseFloat(priceInput.value) || 0;
      const multiplier = parseFloat(multiplierInput.value) || 1.05;
      const extra = getExtraAmount();

      const total = price * rate * multiplier + extra;
      const roundedTotal = Math.round(total);

      resultEl.textContent = "NT$ " + formatNumber(roundedTotal);

      if (price > 0 && rate > 0) {
        resultSubEl.textContent =
          `${formatNumber(price)} 日圓 × ${formatRate(rate)} × ${multiplier} + ${formatNumber(extra)}`;
      } else {
        resultSubEl.textContent = "輸入日幣金額後會自動計算";
      }

      formulaEl.textContent =
        `公式：${price || 0} × ${rate || 0} × ${multiplier || 0} + ${extra} = NT$ ${formatNumber(roundedTotal)}`;

      updateRateText();

      localStorage.setItem("jpy_price", priceInput.value);
      localStorage.setItem("jpy_rate", rateInput.value);
      localStorage.setItem("jpy_multiplier", multiplierInput.value);
      localStorage.setItem("jpy_extra", extraSelect.value);
      localStorage.setItem("jpy_custom_extra", customExtraInput.value);

      updateActiveButton();
    }

    async function fetchRate() {
      statusEl.textContent = "正在抓取今日匯率...";
      statusEl.className = "status";

      try {
        const response = await fetch("https://open.er-api.com/v6/latest/JPY");

        if (!response.ok) {
          throw new Error("API 回應失敗");
        }

        const data = await response.json();

        if (data.result !== "success") {
          throw new Error("API 回傳不是 success");
        }

        const rate = data.rates.TWD;

        if (!rate) {
          throw new Error("沒有取得 TWD 匯率");
        }

        rateInput.value = Number(rate).toFixed(5);

        statusEl.textContent = "已更新今日匯率";
        statusEl.className = "status ok";

        calculate();
      } catch (error) {
        const savedRate = localStorage.getItem("jpy_rate");

        if (savedRate) {
          rateInput.value = savedRate;
          statusEl.textContent = "匯率抓取失敗，已使用上次儲存匯率。";
        } else {
          statusEl.textContent = "匯率抓取失敗，請手動輸入匯率。";
        }

        statusEl.className = "status error";
        console.error(error);
        calculate();
      }
    }

    function copyResult() {
      const text = resultEl.textContent;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          statusEl.textContent = "已複製結果：" + text;
          statusEl.className = "status ok";
        }).catch(() => {
          alert(text);
        });
      } else {
        alert(text);
      }
    }

    function updateActiveButton() {
      quickButtons.forEach(button => {
        if (
          customExtraInput.value.trim() === "" &&
          button.dataset.extra === extraSelect.value
        ) {
          button.classList.add("active");
        } else {
          button.classList.remove("active");
        }
      });
    }

    function loadSavedData() {
      const savedPrice = localStorage.getItem("jpy_price");
      const savedRate = localStorage.getItem("jpy_rate");
      const savedMultiplier = localStorage.getItem("jpy_multiplier");
      const savedExtra = localStorage.getItem("jpy_extra");
      const savedCustomExtra = localStorage.getItem("jpy_custom_extra");

      if (savedPrice !== null) priceInput.value = savedPrice;
      if (savedRate !== null) rateInput.value = savedRate;
      if (savedMultiplier !== null) multiplierInput.value = savedMultiplier;
      if (savedExtra !== null) extraSelect.value = savedExtra;
      if (savedCustomExtra !== null) customExtraInput.value = savedCustomExtra;

      calculate();
    }

    themeToggle.addEventListener("click", toggleTheme);

    rateInput.addEventListener("input", calculate);
    priceInput.addEventListener("input", calculate);
    multiplierInput.addEventListener("input", calculate);

    extraSelect.addEventListener("change", () => {
      customExtraInput.value = "";
      calculate();
    });

    customExtraInput.addEventListener("input", calculate);

    quickButtons.forEach(button => {
      button.addEventListener("click", () => {
        extraSelect.value = button.dataset.extra;
        customExtraInput.value = "";
        calculate();
      });
    });

    initTheme();
    loadSavedData();
    fetchRate();
  </script>
</body>
</html>
